title: France-IOI knowledge base
url: "https://france-ioi.github.io"
baseurl: "/knowledge-base"

source: docs

remote_theme: just-the-docs/just-the-docs@v0.10.0

search_enabled: true
permalink: pretty

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub."
gh_edit_repository: "https://github.com/France-ioi/knowledge-base"
gh_edit_branch: "master"
gh_edit_source: docs
gh_edit_view_mode: "edit"

defaults:
  - scope:
      path: ""
    values:
      layout: "page"
  - scope:
      path: "archive"
    values:
      nav_exclude: true

exclude:
  - "templates/"
